name: Gerar Release do Microsite

on:
  push:
    branches:
      - main # Executa sempre que enviares código para a main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão obrigatória para criar a Release

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências
        run: npm install

      - name: Build Vite
        run: npm run build

      - name: Gerar ZIP do Dist
        # Compacta a pasta dist no ficheiro com o nome exato que pediste
        run: zip -r arquivos-microsite.zip dist/

      - name: Criar/Atualizar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Build Atualizado - Microsite 🏛️"
          body: |
            ### Assets de Produção
            Este release contém o build mais recente gerado automaticamente.
            **Arquivo:** `arquivos-microsite.zip`
          files: arquivos-microsite.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Opcional)
        uses: actions/upload-artifact@v4
        with:
          name: "Arquivo do Microsite"
          path: arquivos-microsite.zip
          retention-days: 7